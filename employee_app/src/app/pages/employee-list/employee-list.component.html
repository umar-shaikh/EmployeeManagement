<div class="container py-4">

    <div class="card border-0 shadow-sm rounded-4">

        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="fw-bold mb-1">
                        {{ employeeObj.name }}
                    </h2>

                    <p class="text-muted mb-0">
                        Employee Details
                    </p>

                </div>

            </div>

            <div class="row g-4">

                <div class="col-md-6">

                    <label class="text-muted small">
                        Contact Number
                    </label>

                    <div class="fw-semibold">
                        {{ employeeObj.contactNo }}
                    </div>

                </div>

                <div class="col-md-6">

                    <label class="text-muted small">
                        Email
                    </label>

                    <div class="fw-semibold">
                        {{ employeeObj.email }}
                    </div>

                </div>

                <div class="col-md-6">

                    <label class="text-muted small">
                        City
                    </label>

                    <div class="fw-semibold">
                        {{ employeeObj.city }}
                    </div>

                </div>

                <div class="col-md-6">

                    <label class="text-muted small">
                        State
                    </label>

                    <div class="fw-semibold">
                        {{ employeeObj.state }}
                    </div>

                </div>

                <div class="col-md-6">

                    <label class="text-muted small">
                        Pincode
                    </label>

                    <div class="fw-semibold">
                        {{ employeeObj.pincode }}
                    </div>

                </div>

                <div class="col-md-6">

                    <label class="text-muted small">
                        Role
                    </label>

                    <div class="fw-semibold">
                        {{ employeeObj.role }}
                    </div>

                </div>

                <div class="col-12">

                    <label class="text-muted small">
                        Address
                    </label>

                    <div class="fw-semibold">
                        {{ employeeObj.address }}
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
