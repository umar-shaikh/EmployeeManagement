<div class="wrapper">

  <!-- Sidebar -->
  <div class="sidebar"
       [class.collapsed]="isSidebarCollapsed">

    <div class="sidebar-header d-flex justify-content-between align-items-center">
      <h4 *ngIf="!isSidebarCollapsed">EMS</h4>

      <button class="btn btn-light btn-sm"
              (click)="toggleSidebar()">
        ☰
      </button>
    </div>

    <ul class="nav flex-column mt-4">

      <li class="nav-item">
        <a routerLink="/dashboard"
           class="nav-link">
          <i class="bi bi-speedometer2"></i>
          <span *ngIf="!isSidebarCollapsed"> Dashboard</span>
        </a>
      </li>

      <li class="nav-item">
        <a routerLink="/employee-form"
           class="nav-link">
          <i class="bi bi-people"></i>
          <span *ngIf="!isSidebarCollapsed"> Employees</span>
        </a>
      </li>

      <li class="nav-item">
        <a routerLink="/designation"
           class="nav-link">
          <i class="bi bi-briefcase"></i>
          <span *ngIf="!isSidebarCollapsed"> Designations</span>
        </a>
      </li>

      <li class="nav-item">
        <a routerLink="/department"
           class="nav-link">
          <i class="bi bi-building"></i>
          <span *ngIf="!isSidebarCollapsed"> Departments</span>
        </a>
      </li>

      <li class="nav-item ">

        <button class="nav-link btn text-start w-100"
                (click)="logout()">

          <i class="bi bi-box-arrow-right"></i>

          <span *ngIf="!isSidebarCollapsed">
            Logout
          </span>

        </button>

      </li>

      

    </ul>

  </div>

  <!-- Main Content -->
  <div class="content">

    <div class="container-fluid p-4">
      <h2>Admin Dashboard</h2>

      <!-- Routed pages -->
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
